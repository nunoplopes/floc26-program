<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8" />
    <script>(function(){var t=localStorage.getItem("theme");if(t==="dark"||t==="light")document.documentElement.setAttribute("data-theme",t);})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>No Internet Connection</title>
    <link rel="stylesheet" type="text/css" href="program.css?v=80f4ab1ec7" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#225" />
    <style>
        .offline_page {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 60px 20px;
            gap: 14px;
        }
        .offline_icon { font-size: 48px; }
        .offline_title { font-size: 20px; font-weight: bold; }
        .offline_message { color: var(--color-text-muted); max-width: 360px; }
        .offline_back_btn {
            margin-top: 10px;
            padding: 10px 24px;
            border: 1px solid var(--color-border);
            border-radius: 4px;
            background: var(--color-bg);
            color: var(--color-text);
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
        }
        .offline_back_btn:hover { border-color: var(--color-accent); color: var(--color-accent); }
    </style>
</head>
<body>
<table class="page_table" cellpadding="0" cellspacing="0">
<tbody>
    <tr>
        <td class="central_td_column">
            <div id="content">
                <div class="offline_page">
                    <div class="offline_icon">📡</div>
                    <div class="offline_title">No Internet Connection</div>
                    <div class="offline_message">This page hasn't been saved for offline access yet. Connect to the Internet and try again.</div>
                    <button type="button" id="offline_back_btn" class="offline_back_btn">Back</button>
                </div>
            </div>
        </td>
    </tr>
</tbody>
</table>

<script>
    document.getElementById('offline_back_btn').addEventListener('click', () => {
        if (window.history.length > 1) {
            history.back();
        } else {
            window.location.href = 'index.html';
        }
    });
</script>
</body>
</html>
