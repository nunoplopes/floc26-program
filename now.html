<script>
(function () {
    const container = document.getElementById('now_groups_container');
    const emptyDiv = document.getElementById('now_empty');
    const currentHeading = "Happening now";
    const nextHeading = "Up next";
    const noCurrentLabel = "No session is running right now.";
    const noNextLabel = "No upcoming session scheduled.";

    function escapeHtml(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return String(text || '').replace(/[&<>"']/g, m => map[m]);
    }

    function getEventNowStamp(timeZone) {
        const parts = new Intl.DateTimeFormat('en-CA', {
            timeZone,
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            hour12: false,
        }).formatToParts(new Date());
        const get = (type) => parts.find((p) => p.type === type).value;
        return `${get('year')}-${get('month')}-${get('day')}T${get('hour')}:${get('minute')}`;
    }

    function render(sessions, nowStamp) {
        container.innerHTML = '';

        const byGroup = new Map();
        sessions.forEach((s) => {
            const key = s.groupName || '';
            if (!byGroup.has(key)) byGroup.set(key, { groupName: key, groupHref: s.groupHref || '', sessions: [] });
            byGroup.get(key).sessions.push(s);
        });

        const groups = [...byGroup.values()];

        groups.forEach((group) => {
            group.sessions.sort((a, b) => `${a.date}T${a.start}`.localeCompare(`${b.date}T${b.start}`));

            group.current = group.sessions.find((s) => s.end
                && nowStamp >= `${s.date}T${s.start}` && nowStamp < `${s.date}T${s.end}`);
            group.next = group.sessions.find((s) => `${s.date}T${s.start}` > nowStamp);
        });

        const sortStamp = (group) => {
            const s = group.current || group.next;
            return s ? `${s.date}T${s.start}` : '';
        };
        groups.sort((a, b) => sortStamp(a).localeCompare(sortStamp(b)));

        groups.forEach((group) => {
            const { current, next } = group;
            if (!current && !next) return;

            const heading = document.createElement('div');
            heading.className = 'date';
            if (group.groupHref) {
                const headingLink = document.createElement('a');
                headingLink.href = group.groupHref;
                headingLink.textContent = group.groupName;
                heading.appendChild(headingLink);
            } else {
                heading.textContent = group.groupName;
            }
            container.appendChild(heading);

            const ul = document.createElement('ul');
            ul.className = 'agenda-list';
            if (current) ul.appendChild(renderItem(current, true, currentHeading));
            if (next) ul.appendChild(renderItem(next, false, nextHeading));
            container.appendChild(ul);
        });

        emptyDiv.style.display = container.children.length === 0 ? 'block' : 'none';
    }

    function renderItem(s, isCurrent, tag) {
        const metaParts = [s.dayLabel, `${s.start}-${s.end}`, s.roomName].filter(Boolean).map(escapeHtml);
        const li = document.createElement('li');
        li.className = `now-item${isCurrent ? ' now-current' : ''}`;
        li.innerHTML = `
            <a class="now-item-link" href="${escapeHtml(s.href)}">
                <div class="now-item-tag">${escapeHtml(tag)}</div>
                <div class="now-item-title">${escapeHtml(s.title)}</div>
                <div class="now-item-meta">${metaParts.join(' &middot; ')}</div>
            </a>
        `;
        return li;
    }

    Promise.all([
        fetch('now-data.json', { cache: 'no-store' }).then((r) => (r.ok ? r.json() : [])),
        fetch('build-info.json', { cache: 'no-store' }).then((r) => (r.ok ? r.json() : null)),
    ]).then(([sessions, buildInfo]) => {
        const timeZone = (buildInfo && buildInfo.eventTimeZone) || 'UTC';

        function tick() {
            render(sessions, getEventNowStamp(timeZone));
        }

        tick();
        setInterval(tick, 30000);
    }).catch(() => {});
})();
</script>
