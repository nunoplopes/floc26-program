<script>
(function () {
    const AGENDA_STORAGE_KEY = 'floc:agenda-favorites';
    const emptyDiv = document.getElementById('agenda_empty');
    const listContainer = document.getElementById('agenda_list_container');
    const removeWord = "Remove";

    function escapeHtml(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return String(text || '').replace(/[&<>"']/g, m => map[m]);
    }

    function getFavorites() {
        try {
            return JSON.parse(localStorage.getItem(AGENDA_STORAGE_KEY) || '[]');
        } catch (e) {
            return [];
        }
    }

    function saveFavorites(favorites) {
        localStorage.setItem(AGENDA_STORAGE_KEY, JSON.stringify(favorites));
    }

    function removeFavorite(id) {
        saveFavorites(getFavorites().filter(f => f.id !== id));
        render();
    }

    function render() {
        const favorites = getFavorites();
        listContainer.innerHTML = '';

        if (favorites.length === 0) {
            emptyDiv.style.display = 'block';
            return;
        }
        emptyDiv.style.display = 'none';

        const byDay = new Map();
        favorites.forEach((f) => {
            const day = f.day || '';
            if (!byDay.has(day)) byDay.set(day, []);
            byDay.get(day).push(f);
        });

        byDay.forEach((items, day) => {
            items.sort((a, b) => String(a.time || '').localeCompare(String(b.time || '')));

            if (day) {
                const dayHeading = document.createElement('div');
                dayHeading.className = 'agenda-day';
                dayHeading.textContent = day;
                listContainer.appendChild(dayHeading);
            }

            const ul = document.createElement('ul');
            ul.className = 'agenda-list';

            items.forEach((item) => {
                const li = document.createElement('li');
                li.className = 'agenda-item';

                const metaParts = [item.time, item.room, item.group].filter(Boolean).map(escapeHtml);

                li.innerHTML = `
                    <a class="agenda-item-link" href="${escapeHtml(item.href)}">
                        <div class="agenda-item-title">${escapeHtml(item.title)}</div>
                        <div class="agenda-item-meta">${metaParts.join(' &middot; ')}</div>
                    </a>
                    <button type="button" class="agenda-remove-btn" data-id="${escapeHtml(item.id)}">${escapeHtml(removeWord)}</button>
                `;
                ul.appendChild(li);
            });

            listContainer.appendChild(ul);
        });

        listContainer.querySelectorAll('.agenda-remove-btn').forEach((btn) => {
            btn.addEventListener('click', () => removeFavorite(btn.dataset.id));
        });
    }

    render();
})();
</script>
