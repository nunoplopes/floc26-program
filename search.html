        #search_input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            font-size: 16px;
            border: 1px solid var(--color-border);
            border-radius: 4px;
            margin-bottom: 20px;
            font-family: inherit;
            background: var(--color-bg);
            color: var(--color-text);
            position: relative;
            z-index: 30;
        }
        .search-results {
            list-style: none;
            padding: 0;
        }
        .search-result-item {
            padding: 15px 0;
            border-bottom: 1px solid var(--color-border-light);
            margin-bottom: 10px;
        }
        .search-result-item:last-child {
            border-bottom: none;
        }
        .search-result-link {
            text-decoration: none;
            color: inherit;
        }
        .search-result-title-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 5px;
        }
        .search-result-title {
            font-weight: bold;
            font-size: 16px;
        }
        .search-result-title-row .group_tag {
            flex-shrink: 0;
            margin-top: 2px;
        }
        .search-result-title-row .group_tag[data-group-href] {
            cursor: pointer;
            text-decoration: underline;
            text-decoration-color: rgba(255, 255, 255, 0.55);
            text-underline-offset: 2px;
        }
        .search-result-title-row .group_tag[data-group-href]:hover {
            text-decoration-color: currentColor;
            filter: brightness(1.15);
        }
        .search-result-authors {
            font-size: 14px;
            color: var(--color-text-muted-3);
            margin-bottom: 5px;
        }
        .search-result-chairs {
            font-size: 14px;
            color: var(--color-text-muted-3);
            font-style: italic;
            margin-bottom: 5px;
        }
        .search-result-session {
            font-size: 13px;
            color: var(--color-text-icon);
            margin-bottom: 8px;
        }
        .search-result-abstract {
            font-size: 14px;
            color: var(--color-text-muted);
            line-height: 1.4;
        }
        .search-result-affiliations {
            font-size: 12px;
            color: var(--color-text-muted-3);
            margin-top: 5px;
            font-style: italic;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .search-no-results {
            padding: 20px 0;
            color: var(--color-text-icon);
            text-align: center;
        }
        .search-loading {
            padding: 20px 0;
            color: var(--color-text-icon);
            text-align: center;
        }
    </style>
</head>
<body>

<table class="page_table" cellpadding="0" cellspacing="0">
<tbody>
    <tr>
        <td class="central_td_column">
            <div id="header">
                <a href="index.html"><img class="event_logo" src="event_logo.png" alt="Federated Logic Conference 2026" /></a>
                <div id="title">FEDERATED LOGIC CONFERENCE 2026</div>
                <div class="header_fabs">
                    <button id="theme_toggle_btn" class="header_fab" title="Toggle light/dark theme" aria-label="Toggle light/dark theme">🌙</button>
                    <div class="header_menu">
                        <button id="header_menu_btn" class="header_fab" title="Menu" aria-label="Menu" aria-haspopup="true" aria-expanded="false">☰</button>
                        <div id="header_menu_panel" class="header_menu_panel">
                            <a id="today_link" href="#" style="display:none;" aria-label="Today"><span class="header_menu_icon">📅</span>Today</a>
                            <a id="now_link" href="now.html" aria-label="Now and Next"><span class="header_menu_icon">🕐</span>Now and Next</a>
                            <a id="agenda_link" href="agenda.html" aria-label="My Agenda"><span class="header_menu_icon">★</span>My Agenda</a>
                            <a id="rooms_link" href="rooms.html" aria-label="Rooms"><span class="header_menu_icon">🚪</span>Rooms</a>
                            <button id="install_pwa_btn" type="button" style="display:none;" aria-label="Install as app"><span class="header_menu_icon">📥</span>Install as app</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="pwa_labels" style="display:none;" data-update-message="A new version is available." data-update-action="Reload"></div>
            <div id="now_labels" style="display:none;" data-badge-label="NOW" data-jump-label="Jump to the session happening now"></div>


            <div id="main_menu">
                <a href="index.html">PROGRAM</a>
                <a href="talk_author_index.html">AUTHORS</a>
                <a href="search.html" class="selected">Search</a>
            </div>


            <div id="content">
                <div id="pagetitle">SEARCH</div>

                <input
                    type="text"
                    id="search_input"
                    placeholder="Search by title, authors, or content..."
                    autocomplete="off"
                    autofocus />

                <div id="search_loading" class="search-loading" style="display:none;">Loading data...</div>
                <ul class="search-results" id="search_results"></ul>
                <div id="search_no_results" class="search-no-results" style="display:none;">No results for your search.</div>
            </div>

            <div id="disclaimer">
                Designed and Developed by EventKey | Copyright 2026 EventKey
                <span id="last_updated">Last updated: <span id="last_updated_value" data-offline-label="Offline"></span><span id="last_updated_local_group"> &middot; Local time: <span id="last_updated_value_local"></span></span></span>

<div class="fab_bar">
    <a id="fab_search" class="fab_btn" href="search.html" title="Search" aria-label="Search">🔍</a>
    <button id="back_btn" class="fab_btn" title="Back" aria-label="Back">←</button>
</div>


<script>
    const searchInput = document.getElementById('search_input');
    const resultsList = document.getElementById('search_results');
    const loadingDiv = document.getElementById('search_loading');
    const noResultsDiv = document.getElementById('search_no_results');

    let allTalks = [];
    let debounceTimer;

    resultsList.addEventListener('click', (event) => {
        const tag = event.target.closest('.group_tag[data-group-href]');
        if (!tag) return;
        event.preventDefault();
        event.stopPropagation();
        window.location.href = tag.dataset.groupHref;
    });

    const CACHE_KEY = 'floc:search-cache';

    async function fetchAllTalks() {
        const talks = [];
        const manifest = await fetch('data/manifest.json', { cache: 'no-store' });
        if (manifest.ok) {
            const manifestData = await manifest.json();
            const groupResults = await Promise.all(manifestData.groupIds.map(async groupId => {
                const jsonFile = `data/group-${groupId}.json`;
                const response = await fetch(jsonFile, { cache: 'no-store' });
                return response.ok ? await response.json() : null;
            }));
            for (const data of groupResults) {
                if (data) {
                    for (const talk of data.talks || []) {
                        talks.push(Object.assign({ groupName: data.groupName || '' }, talk));
                    }
                }
            }
        }
        return talks;
    }

    async function loadSearchData() {
        loadingDiv.style.display = 'block';
        resultsList.innerHTML = '';
        noResultsDiv.style.display = 'none';

        try {
            let version = null;
            try {
                const buildInfo = await fetch('build-info.json', { cache: 'no-store' });
                if (buildInfo.ok) {
                    version = (await buildInfo.json()).generatedAtUtc;
                }
            } catch (e) {
                console.error('Failed to check build version:', e);
            }

            let cached = null;
            if (version) {
                try {
                    const stored = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
                    if (stored && stored.version === version) {
                        cached = stored.talks;
                    }
                } catch (e) {
                    console.error('Failed to read search cache:', e);
                }
            }

            if (cached) {
                allTalks = cached;
            } else {
                allTalks = await fetchAllTalks();
                if (version) {
                    try {
                        localStorage.setItem(CACHE_KEY, JSON.stringify({ version, talks: allTalks }));
                    } catch (e) {
                        console.error('Failed to write search cache:', e);
                    }
                }
            }
        } catch (e) {
            console.error('Failed to load search data:', e);
        }

        loadingDiv.style.display = 'none';
        performSearch();
    }

    function normalizeText(text) {
        return text
            .normalize('NFD')
            .replace(/[̀-ͯ]/g, '')
            .replace(/[đĐ]/g, 'd')
            .replace(/[øØ]/g, 'o')
            .replace(/[łŁ]/g, 'l')
            .toLowerCase();
    }

    function performSearch() {
        const query = normalizeText(searchInput.value.trim());

        if (!query) {
            resultsList.innerHTML = '';
            noResultsDiv.style.display = 'none';
            return;
        }

        const results = allTalks.filter(talk => {
            const searchText = normalizeText([
                talk.title,
                talk.authors,
                talk.chairs,
                talk.abstract,
                talk.sessionName,
                talk.affiliations.join(' ')
            ].join(' '));

            return searchText.includes(query);
        });

        if (results.length === 0) {
            resultsList.innerHTML = '';
            noResultsDiv.style.display = 'block';
            return;
        }

        resultsList.innerHTML = '';
        noResultsDiv.style.display = 'none';

        results.forEach(talk => {
            const li = document.createElement('li');
            li.className = 'search-result-item';

            const affiliationsHtml = talk.affiliations.length > 0
                ? `<div class="search-result-affiliations">${escapeHtml(talk.affiliations.join(', '))}</div>`
                : '';

            const authorsHtml = talk.authors
                ? `<div class="search-result-authors">${escapeHtml(talk.authors)}</div>`
                : '';

            const chairsHtml = talk.chairs
                ? `<div class="search-result-chairs">${escapeHtml(talk.chairs)}</div>`
                : '';

            const abstractHtml = talk.abstract
                ? `<div class="search-result-abstract">${escapeHtml(talk.abstract.substring(0, 200))}${talk.abstract.length > 200 ? '...' : ''}</div>`
                : '';

            const groupHtml = talk.groupName
                ? `<span class="group_tag"${talk.groupIndexHref ? ` data-group-href="${escapeHtml(talk.groupIndexHref)}"` : ''}>${escapeHtml(talk.groupName)}</span>`
                : '';

            const targetHref = (!navigator.onLine && talk.groupIndexHref) ? talk.groupIndexHref : talk.href;

            li.innerHTML = `
                <a href="${escapeHtml(targetHref)}" class="search-result-link">
                    <div class="search-result-title-row">
                        <div class="search-result-title">${escapeHtml(talk.title)}</div>
                        ${groupHtml}
                    </div>
                    ${authorsHtml}
                    ${chairsHtml}
                    <div class="search-result-session">${escapeHtml(talk.sessionName)} • ${escapeHtml(talk.day)} ${escapeHtml(talk.startTime)}</div>
                    ${affiliationsHtml}
                    ${abstractHtml}
                </a>
            `;
            resultsList.appendChild(li);
        });
    }

    function escapeHtml(text) {
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };
        return text.replace(/[&<>"']/g, m => map[m]);
    }

    searchInput.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(performSearch, 300);
    });

    searchInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
            event.preventDefault();
            clearTimeout(debounceTimer);
            performSearch();
            searchInput.blur();
        }
    });

    window.addEventListener('load', () => {
        loadSearchData();
        searchInput.focus();
    });
</script>
